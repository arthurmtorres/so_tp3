syntax = "proto3";

package inventory;

option java_multiple_files = true;
option java_package = "tp3.grpc";
option java_outer_classname = "InventoryProto";

service InventoryService {
    rpc ListItems (Empty) returns (ItemList);
    rpc GetItem (ItemRequest) returns (ItemReply);
    rpc Purchase (PurchaseRequest) returns (PurchaseReply);
    rpc Cancel (PurchaseRequest) returns (PurchaseReply);
}

message Empty {}

message ItemReply {
    string name = 1;
    int32 stock = 2;
}

message ItemList {
    repeated ItemReply items = 1;
}

message ItemRequest {
    string id = 1; 
}

message PurchaseRequest {
    string item = 1;
    int32 quantity = 2;
    string clientId = 3;
}

message PurchaseReply {
    bool success = 1;
    int32 remaining = 2;
}